#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json
packaging_format = 2

id = "mcp-ssh"
name = "MCP SSH Approval"
description.en = "Remote MCP with one SSH command tool and mandatory YunoHost approval"
description.fr = "MCP distant avec un outil SSH et approbation YunoHost obligatoire"
version = "4.0.0~ynh1"
maintainers = ["faleious-ai"]

[upstream]
license = "MIT"
code = "https://github.com/faleious-ai/mcp-ssh_ynh"

[integration]
yunohost = ">= 12.1.40"
helpers_version = "2.1"
architectures = "all"
multi_instance = false
ldap = "not_relevant"
sso = true
disk = "180M"
ram.build = "350M"
ram.runtime = "160M"

[install]
    [install.domain]
    type = "domain"
    full_domain = true

    [install.approver]
    ask.en = "YunoHost user allowed to authorize OAuth clients and SSH commands"
    ask.fr = "Utilisateur YunoHost autorisé à approuver les clients OAuth et les commandes SSH"
    type = "user"

[resources]
    [resources.system_user]
    allow_ssh = true
    home = "/home/yunohost.app/__APP__"

    [resources.install_dir]
    dir = "/opt/yunohost/__APP__"

    [resources.data_dir]
    dir = "/home/yunohost.app/__APP__"

    [resources.ports]
    main.default = 8095

    [resources.nodejs]
    version = "22"

    [resources.permissions]
    main.url = "/approvals"
    main.additional_urls = ["re:^/approvals/.*$", "/oauth/authorize"]
    main.show_tile = true
    main.auth_header = true

    api.url = "/mcp"
    api.additional_urls = ["/health", "/oauth/register", "/oauth/token", "/.well-known/oauth-protected-resource", "/.well-known/oauth-protected-resource/mcp", "/.well-known/oauth-authorization-server"]
    api.allowed = "visitors"
    api.show_tile = false
    api.auth_header = false
    api.protected = true

    [resources.apt]
    packages = ["ca-certificates", "openssh-client", "openssh-server", "rsync", "sudo"]
